uuid: 9730b4dc-02aa-4e0a-8142-8f3f399ad1e3
langcode: en
status: false
dependencies:
  enforced:
    module:
      - wa_migration
id: stories_dk
class: null
field_plugin_method: null
cck_plugin_method: null
migration_tags:
  - Database
migration_group: wateraid_dk_nodes
label: 'Stories DK '
source:
  plugin: node_source
  bundle: stories
  fields:
    - field_audiences
    - field_countries
    - field_get_involved_terms
    - field_meta_tags
    - field_themes
    - field_modules
    - field_article_hero_image
    - field_article_hero_video
    - field_teaser_image
process:
  langcode:
    -
      plugin: default_value
      default_value: da
  status: status
  moderation_state:
    plugin: static_map
    source: status
    default_value: draft
    map:
      - draft
      - published
  title: title
  temp_image:
    plugin: migration_lookup
    source: field_article_hero_image
    migration: media_dk
    no_stub: true
  field_hero:
    plugin: image_or_video_to_hero
    source:
      - '@temp_image'
      - field_media_video_embed_field
  field_teaser_text: body__summary
  field_teaser_image:
    plugin: migration_lookup
    migration: media_dk
    source: field_teaser_image
    no_stub: true
  field_audience:
    plugin: migration_lookup
    migration: audiences_dk
    source: field_audiences
    no_stub: true
  field_country:
    plugin: migration_lookup
    migration: countries_dk
    source: field_countries
    no_stub: true
  field_get_involved:
    plugin: migration_lookup
    migration: get_involved_dk
    source: field_get_involved_terms
    no_stub: true
  field_meta_tags: field_meta_tags
  field_theme:
    plugin: migration_lookup
    migration: themes_dk
    source: field_themes
    no_stub: true
  uid:
    plugin: migration_lookup
    migration: users_dk
    source: uid
    no_stub: true
  temp_body:
    -
      plugin: body_to_paragraph
      source: body__value
  temp_paragraphs:
    -
      plugin: paragraph_migration_lookup
      migration:
        - general_text_area_dk
        - wysiwyg_dk
        - menu_cta_dk
        - resource_link_with_description_dk
        - faqs_dk
        - view_more_teasers_dk
        - aside_link_item_dk
        - info_section_dk
        - quote_simple_dk
        - image_dk
        - image_gallery_dk
        - video_dk
        - carousel_dk
        - content_carousel_dk
        - enhanced_carousel_dk
        - tabbed_dk
        - content_with_large_image_dk
        - aside_with_image_dk
        - quote_dk
        - listing_dk
        - biography_dk
        - activation_bar_item_dk
        - rainbow_link_item_dk
        - donation_cta_widget_embed_dk
        - hero_in_content_dk
        - variable_content_module_dk
        - statistics_dk
        - statistics_icons_dk
        - curated_listing_dk
        - curated_listing_overriden_dk
      source: field_modules
  field_content:
    plugin: merge_without_exception
    source:
      - '@temp_body'
      - '@temp_paragraphs'
destination:
  plugin: 'entity:node'
  default_bundle: story
idMap: {  }
migration_dependencies:
  required:
    - audiences_dk
    - countries_dk
    - get_involved_dk
    - themes_dk
    - users_dk
include: null
