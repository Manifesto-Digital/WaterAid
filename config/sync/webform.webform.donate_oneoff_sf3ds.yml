elements: |-
  other:
    '#type': webform_wizard_page
    '#title': 'Donate to WaterAid'
    donation_amount:
      '#type': donations_webform_amount
      '#title': '❶ 寄付金額'
      '#title_display': before
      '#required': true
      '#frequency__access': false
      '#amount__required': true
    corporate_name_in_japanese:
      '#type': textfield
      '#title': 法人名（フリガナ）
      '#maxlength': 80
      '#placeholder': ○○○カブシキガイシャ
      '#required': true
      '#states':
        visible:
          ':input[name="individual_corporate"]':
            value: corporate
    individual_corporate:
      '#type': radios
      '#title': 個人／法人
      '#options':
        individual: 個人
        corporate: 法人
      '#required': true
      '#default_value': individual
    corporate_name:
      '#type': textfield
      '#title': 法人名
      '#maxlength': 34
      '#placeholder': 〇〇〇株式会社
      '#required': true
      '#states':
        visible:
          ':input[name="individual_corporate"]':
            value: corporate
    last_name:
      '#type': textfield
      '#title': 姓
      '#maxlength': 40
      '#placeholder': 山田
      '#required': true
    first_name:
      '#type': textfield
      '#title': 名
      '#maxlength': 40
      '#placeholder': 太郎
      '#required': true
    last_name_in_japanese:
      '#type': textfield
      '#title': セイ
      '#maxlength': 80
      '#placeholder': ヤマダ
      '#required': true
    first_name_in_japanese:
      '#type': textfield
      '#title': メイ
      '#maxlength': 80
      '#placeholder': タロウ
      '#required': true
    postcode:
      '#type': textfield
      '#title': 郵便番号
      '#minlength': 7
      '#maxlength': 8
      '#placeholder': 123-4567
      '#required': true
    prefecture:
      '#type': textfield
      '#title': 都道府県
      '#minlength': 3
      '#maxlength': 4
      '#placeholder': 東京都
      '#required': true
    city:
      '#type': textfield
      '#title': 市区町村
      '#help': 14文字以内でご入力ください。
      '#maxlength': 14
      '#placeholder': 墨田区○○町
      '#required': true
    street:
      '#type': textfield
      '#title': 番地・建物名
      '#help': |-
        36文字以内でご入力ください。<br />
        ※番地・部屋番号をお忘れなくご入力ください。
      '#maxlength': 36
      '#placeholder': '2丁目○○番地　〇ビル101'
      '#required': true
    email:
      '#type': loqate_email_composite
      '#title': メールアドレス
      '#required': true
      '#loqate_validation': false
      '#loqate_validation_refuse_disposable': false
      '#email__title': メールアドレス
      '#email__placeholder': your@email.com
      '#email__required': true
    e_newsletter:
      '#type': checkbox
      '#title': このメールアドレスにメールマガジンを配信する
      '#default_value': true
    phone:
      '#type': textfield
      '#title': 電話番号
      '#help': 半角数字・ハイフン（ー）無しで入力ください。
      '#minlength': 10
      '#maxlength': 13
      '#placeholder': '09012345678'
      '#required': true
    payment_information:
      '#type': fieldset
      '#title': '❸ お支払い情報'
      payment:
        '#type': donations_webform_payment
        '#title': 決済方法
      receipt:
        '#type': radios
        '#title': 領収書発行
        '#description': '<h5>※お申込み者名と異なる名義で領収書発行をご希望の場合、希望される領収書名を【備考欄】にご記入ください。</h5>'
        '#options':
          'yes': 希望する
          'no': 希望しない
        '#required': true
        '#default_value': 'yes'
      memo:
        '#type': textarea
        '#title': 備考欄
        '#maxlength': 255
      sf3ds_success:
        '#type': value
        '#title': 'Success Flag'
    actions:
      '#type': webform_actions
      '#title': 'Submit button(s)'
      '#submit__label': お申込み内容確認画面へ
  submission_info:
    '#type': webform_markup
    '#markup': '<p>・入力内容はSSL暗号化して送信されます。<br>・docomo、au、softbankなど携帯電話会社のセキュリティ設定のため受信拒否と認識されている、または迷惑メール対策としてご自身でドメイン指定受信をご設定の場合、メー ルが正しく届かないことがございます。「@wateraid.org」ドメインを受信できるように設定してください。</p>'
