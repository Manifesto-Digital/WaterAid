wateraid_tmgmt.admin_translations:
  path: '/admin/wateraid/tmgmt'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    _title: 'Translations'
  requirements:
    _permission: 'access wateraid administration pages'

wateraid_tmgmt.source_overview:
  path: '/admin/wateraid/tmgmt/sources'
  defaults:
    _title: 'Translation Sources'
    _form: 'Drupal\wateraid_tmgmt\Form\BulkSourceOverviewForm'
  requirements:
    _entity_create_access: tmgmt_job

wateraid_tmgmt.remote_error_log_form:
  path: '/admin/wateraid/tmgmt/remote_error_log'
  defaults:
    _form: '\Drupal\wateraid_tmgmt\Form\RemoteErrorLogForm'
    _title: 'Remote error log'
  requirements:
    _entity_create_access: tmgmt_job

wateraid_tmgmt.settings:
  path: '/admin/wateraid/tmgmt/settings'
  defaults:
    _title: 'WaterAid TMGMT Settings'
    _form: 'Drupal\wateraid_tmgmt\Form\SettingsForm'
  requirements:
    _permission: 'administer tmgmt'
